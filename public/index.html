<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatNow — Random Video Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --card: #1a2235;
      --accent: #4f8ef7;
      --accent2: #7c3aed;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #f0f4ff;
      --muted: #8892aa;
      --border: rgba(255,255,255,0.08);
      --glow: 0 0 30px rgba(79,142,247,0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated Background ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 50% at 20% 20%, rgba(79,142,247,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 40% at 80% 80%, rgba(124,58,237,0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    .page { position: relative; z-index: 1; }

    /* ━━━━━━━━━━━━━━ AUTH PAGE ━━━━━━━━━━━━━━ */
    #auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--glow), 0 20px 60px rgba(0,0,0,0.5);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo h1 {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #4f8ef7, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .auth-logo p { color: var(--muted); font-size: 14px; margin-top: 6px; }

    .tab-switcher {
      display: flex;
      background: var(--surface);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--muted);
      border-radius: 10px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: white;
    }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--accent);
    }
    .form-group select option { background: var(--surface); }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .divider span { color: var(--muted); font-size: 12px; }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .btn-guest {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-guest:hover { border-color: var(--accent); color: var(--text); }

    #auth-error {
      color: var(--red);
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
      min-height: 20px;
    }

    /* ━━━━━━━━━━━━━━ MAIN APP ━━━━━━━━━━━━━━ */
    #app-page { display: none; min-height: 100vh; flex-direction: column; }
    #app-page.visible { display: flex; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: rgba(26,34,53,0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }

    .header-logo {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, #4f8ef7, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-user {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--muted);
    }
    .user-badge span { color: var(--text); font-weight: 500; }

    .lang-display {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .btn-logout {
      padding: 6px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* Main Layout */
    .main-layout {
      flex: 1;
      display: flex;
      gap: 0;
      max-height: calc(100vh - 57px);
    }

    /* Video Side */
    .video-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 16px;
      overflow-y: auto;
    }

    .video-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .video-wrapper {
      position: relative;
      background: #050810;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 4/3;
      border: 1px solid var(--border);
    }
    .video-wrapper video {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #local { transform: scaleX(-1); }

    .video-label {
      position: absolute;
      bottom: 10px; left: 10px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.9);
    }

    /* Status Bar */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-dot.waiting { background: var(--yellow); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    #status-text { font-size: 14px; font-weight: 500; flex: 1; }

    /* Controls */
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      flex: 1;
      min-width: 100px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .ctrl-btn:hover { border-color: var(--accent); background: rgba(79,142,247,0.1); }
    .ctrl-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
    .ctrl-btn.danger:hover { border-color: var(--red); background: rgba(239,68,68,0.1); }
    .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #startBtn { border-color: var(--green); color: var(--green); }
    #startBtn:hover { background: rgba(16,185,129,0.15); }
    #leaveBtn { border-color: var(--red); color: var(--red); }
    #leaveBtn:hover { background: rgba(239,68,68,0.1); }
    #reportBtn { border-color: var(--yellow); color: var(--yellow); }
    #reportBtn:hover { background: rgba(245,158,11,0.1); }

    /* Partner Info Banner */
    #partner-info {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(79,142,247,0.1);
      border: 1px solid rgba(79,142,247,0.2);
      border-radius: 10px;
      font-size: 13px;
    }
    #partner-info.visible { display: flex; }
    .partner-lang-badge {
      background: rgba(79,142,247,0.2);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 12px;
      color: var(--accent);
    }
    .translate-toggle {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    /* Toggle switch */
    .switch {
      position: relative; width: 38px; height: 20px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 2px; top: 2px;
      background: var(--muted);
      border-radius: 50%;
      transition: 0.2s;
    }
    .switch input:checked + .slider { background: var(--accent); border-color: var(--accent); }
    .switch input:checked + .slider::before { transform: translateX(18px); background: white; }

    /* Chat Side */
    .chat-side {
      width: 340px;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      background: var(--card);
    }

    .chat-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      padding: 10px 14px;
      border-radius: 16px;
      max-width: 85%;
      font-size: 14px;
      line-height: 1.4;
      position: relative;
    }
    .message .original {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
      font-style: italic;
    }
    .me {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border-bottom-right-radius: 4px;
    }
    .partner {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .system-msg {
      align-self: center;
      font-size: 12px;
      color: var(--muted);
      padding: 4px 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 20px;
    }

    .typing-indicator {
      align-self: flex-start;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .typing-dot {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: typingDot 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingDot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .chat-input-area {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    #msgInput {
      flex: 1;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #msgInput:focus { border-color: var(--accent); }
    #msgInput::placeholder { color: var(--muted); }

    #sendBtn {
      padding: 10px 18px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #sendBtn:hover { opacity: 0.85; }

    /* ━━━━━━━━━━━━━━ REPORT MODAL ━━━━━━━━━━━━━━ */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal h3 {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      margin-bottom: 20px;
      color: var(--yellow);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .report-reasons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .reason-btn {
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .reason-btn.selected {
      border-color: var(--yellow);
      background: rgba(245,158,11,0.15);
      color: var(--yellow);
    }

    .modal textarea {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      margin-bottom: 16px;
    }
    .modal textarea:focus { border-color: var(--yellow); }

    .modal-actions { display: flex; gap: 10px; }
    .btn-cancel {
      flex: 1; padding: 12px;
      background: transparent; border: 1px solid var(--border);
      border-radius: 10px; color: var(--muted);
      cursor: pointer; font-family: 'DM Sans'; font-size: 14px;
      transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: var(--text); color: var(--text); }
    .btn-report-submit {
      flex: 2; padding: 12px;
      background: var(--yellow); border: none;
      border-radius: 10px; color: #000;
      font-family: 'Syne'; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-report-submit:hover { opacity: 0.85; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      padding: 12px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 2000;
      pointer-events: none;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error { border-color: var(--red); color: var(--red); }
    #toast.info { border-color: var(--accent); color: var(--accent); }

    /* Mobile */
    @media (max-width: 768px) {
      .main-layout { flex-direction: column; max-height: none; }
      .video-grid { grid-template-columns: 1fr 1fr; }
      .chat-side { width: 100%; border-left: none; border-top: 1px solid var(--border); height: 400px; }
    }
  </style>
</head>
<body>

<!-- ━━━━━━━━━━━━━━ AUTH PAGE ━━━━━━━━━━━━━━ -->
<div id="auth-page" class="page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>ChatNow</h1>
      <p>Connect with strangers, break language barriers</p>
    </div>

    <div class="tab-switcher">
      <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUsername" placeholder="Your username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password">
      </div>
      <button class="btn-primary" onclick="login()">Sign In</button>
    </div>

    <!-- Register Form -->
    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="regUsername" placeholder="Choose a username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Choose a password" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Your Language</label>
        <select id="regLang">
          <option value="en">🇺🇸 English</option>
          <option value="hi">🇮🇳 Hindi</option>
          <option value="es">🇪🇸 Spanish</option>
          <option value="fr">🇫🇷 French</option>
          <option value="de">🇩🇪 German</option>
          <option value="zh">🇨🇳 Chinese</option>
          <option value="ar">🇸🇦 Arabic</option>
          <option value="pt">🇧🇷 Portuguese</option>
          <option value="ru">🇷🇺 Russian</option>
          <option value="ja">🇯🇵 Japanese</option>
          <option value="ko">🇰🇷 Korean</option>
          <option value="it">🇮🇹 Italian</option>
          <option value="tr">🇹🇷 Turkish</option>
          <option value="bn">🇧🇩 Bengali</option>
        </select>
      </div>
      <button class="btn-primary" onclick="register()">Create Account</button>
    </div>

    <div class="divider"><span>or</span></div>
    <button class="btn-guest" onclick="guestLogin()">
      👤 Continue as Guest
    </button>

    <div id="auth-error"></div>
  </div>
</div>

<!-- ━━━━━━━━━━━━━━ MAIN APP ━━━━━━━━━━━━━━ -->
<div id="app-page" class="page">

  <header>
    <div class="header-logo">ChatNow</div>
    <div class="header-user">
      <div class="lang-display" id="myLangDisplay">🌐 en</div>
      <div class="user-badge">👤 <span id="headerUsername">—</span></div>
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
  </header>

  <div class="main-layout">
    <!-- Video Side -->
    <div class="video-side">

      <div class="video-grid">
        <div class="video-wrapper">
          <video id="local" autoplay muted playsinline></video>
          <div class="video-label">You</div>
        </div>
        <div class="video-wrapper">
          <video id="remote" autoplay playsinline></video>
          <div class="video-label" id="remoteLabel">Stranger</div>
        </div>
      </div>

      <!-- Partner Language Info -->
      <div id="partner-info">
        <span>🌐 Partner speaks</span>
        <span class="partner-lang-badge" id="partnerLangBadge">en</span>
        <div class="translate-toggle">
          <span>Auto-translate</span>
          <label class="switch">
            <input type="checkbox" id="translateToggle" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <!-- Status Bar -->
      <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <div id="status-text">Click "Find Partner" to start</div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="ctrl-btn" id="startBtn" onclick="startChat()">🔍 Find Partner</button>
        <button class="ctrl-btn" id="leaveBtn" onclick="leaveRoom()" disabled>👋 Leave</button>
        <button class="ctrl-btn" id="muteBtn" onclick="toggleMute()">🎤 Mute</button>
        <button class="ctrl-btn" id="cameraBtn" onclick="toggleCamera()">📷 Camera</button>
        <button class="ctrl-btn" id="reportBtn" onclick="openReport()" disabled>🚨 Report</button>
      </div>
    </div>

    <!-- Chat Side -->
    <div class="chat-side">
      <div class="chat-header">💬 Chat</div>
      <div id="messages"></div>
      <div class="chat-input-area">
        <input id="msgInput" placeholder="Type a message…" disabled />
        <button id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- ━━━━━━━━━━━━━━ REPORT MODAL ━━━━━━━━━━━━━━ -->
<div class="modal-overlay" id="reportModal">
  <div class="modal">
    <h3>🚨 Report User</h3>
    <p style="font-size:13px; color:var(--muted); margin-bottom:16px;">Help us keep the community safe</p>

    <div class="report-reasons">
      <button class="reason-btn" data-reason="nudity" onclick="selectReason(this)">🔞 Nudity</button>
      <button class="reason-btn" data-reason="abusive" onclick="selectReason(this)">🤬 Abusive Language</button>
      <button class="reason-btn" data-reason="spam" onclick="selectReason(this)">📢 Spam / Bot</button>
      <button class="reason-btn" data-reason="other" onclick="selectReason(this)">❓ Other</button>
    </div>

    <textarea id="reportDetails" placeholder="Additional details (optional)…"></textarea>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeReport()">Cancel</button>
      <button class="btn-report-submit" onclick="submitReport()">Submit Report</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
